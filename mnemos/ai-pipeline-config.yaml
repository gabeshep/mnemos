  prd_generation:
    acceptance_criteria_appendix:
      applies_to: "ui_features"
      condition: >
        Append this section when the ticket describes any user-facing feature
        that involves asynchronous operations (form submissions, API calls,
        data loading). Do not append for backend-only tickets (schema changes,
        migrations, API-only endpoints with no frontend surface).
      state_visibility:
        section_title: "State Visibility & Error Handling"
        instruction: >
          The following acceptance criteria are mandatory for all UI features
          involving asynchronous operations. They must appear as a named
          subsection within the ticket's Acceptance Criteria block.
        criteria:
          - id: "sv-loading"
            text: >
              [ ] While the async operation is in flight, the UI displays a
              visible loading indicator (e.g., spinner, skeleton screen, or
              disabled/loading button state). The user cannot submit the form
              or trigger the action twice during this period.
          - id: "sv-error"
            text: >
              [ ] If the async operation fails (network error, 4xx/5xx response,
              validation error), the UI displays a user-readable error message
              inline (not a raw error object, not a silent no-op). The message
              must describe what went wrong in plain language and, where possible,
              suggest a recovery action.
          - id: "sv-success"
            text: >
              [ ] Upon successful completion of the async operation, the UI
              provides clear confirmation (e.g., success toast, navigates to
              result, updates the relevant UI element). The user has no ambiguity
              about whether the action succeeded.

evaluation:
  description: >
    Sample fixtures for manually validating the async-ui-state-visibility rule.
    These represent historical Mnemos PR archetypes used to calibrate the
    code_review subagent and guard against false positives.
  fixtures:
    - fixture_id: "ev-001"
      name: "Onboarding form submission without error state"
      description: >
        A PR modifying OnboardingChecklist.tsx to add a form submission that
        calls POST /api/onboarding/steps using fetch(), but only updates local
        state on success. No loading spinner is rendered during the request.
        No error state is rendered when the request fails. This is representative
        of the pattern that caused the 38% drop-off (ticket a466cf13).
      expected_outcome: "flag"
      rationale: >
        Async mutation (fetch POST) with no loading or error state rendered —
        exactly the silent-failure anti-pattern this rule targets.
    - fixture_id: "ev-002"
      name: "Tailwind spacing adjustment on SessionDetailPage"
      description: >
        A PR modifying SessionDetailPage.tsx to change padding and font-size
        Tailwind classes (e.g., p-4 to p-6, text-sm to text-base). No fetch()
        calls, no mutations, no async logic is added or modified.
      expected_outcome: "pass"
      rationale: >
        CSS/style-only change with no async operations introduced — must not
        be flagged to avoid review bloat (explicit exemption applies).
  verify_authz_rls:
    description: >
      Blocking PR evaluation gate that scans code diffs for missing tenant
      isolation on queries against Mnemos tenant-scoped tables. Motivated by
      CVSS 7.5 AuthZ bypass discovered in onboarding API.
    severity: "block"
    kickback_target: "implement"
    max_retry: 2
    escalation_on_limit_exceeded: "human_review"
    prompt: >
      You are a security reviewer specializing in multi-tenant SaaS authorization
      vulnerabilities. Examine the provided code diff carefully.

      TENANT-SCOPED TABLES (all have Postgres RLS policies enforced by
      current_tenant_id()):
        entity, asset, asset_version, session, session_message, capture,
        user, onboarding_state, idempotency_record

      EXEMPT TABLE (no RLS, intentionally queried outside withTenant):
        tenant (used only for slug → tenantId resolution at login)

      REQUIRED PATTERN:
        All queries against tenant-scoped tables MUST be executed inside
        withCurrentTenant(fn) or withTenant(tenantId, fn) from
        lib/tenant-context.js. The AsyncLocalStorage context propagates the
        tenant UUID to Postgres via SET LOCAL app.current_tenant_id.

      PROHIBITED PATTERNS:
        - pool.query(...) on a tenant-scoped table without a wrapping withTenant call
        - db.select() / db.insert() / db.update() / db.delete() (Drizzle ORM)
          on a tenant-scoped table without a wrapping withTenant call

      EVALUATION INSTRUCTIONS:
        1. For each added or modified function in the diff, trace the full call
           chain from route handler to database query.
        2. If any query targets a tenant-scoped table and NO withTenant or
           withCurrentTenant wrapper exists anywhere in the chain, return "flag".
        3. If the query is against the tenant table only, return "pass".
        4. If all tenant-scoped queries are correctly wrapped, return "pass".

      OUTPUT FORMAT (JSON):
        {
          "outcome": "flag" | "pass",
          "violations": [
            {
              "file": "<path>",
              "line": <number>,
              "table": "<table_name>",
              "code_snippet": "<offending line>",
              "reason": "<one-sentence explanation>"
            }
          ]
        }
        Return violations as an empty array when outcome is "pass".
    fixtures:
      - fixture_id: "rls-001"
        name: "Direct pool.query on entity table without withTenant"
        description: >
          A PR adds a new GET /api/entities/:id route that executes
          pool.query('SELECT * FROM entity WHERE id = $1', [req.params.id])
          directly in the route handler body, with no withTenant or
          withCurrentTenant wrapper anywhere in the call chain.
        expected_outcome: "flag"
        rationale: >
          Bare pool.query on tenant-scoped table without withTenant context.
          Postgres RLS will return 0 rows for any non-superuser connection,
          and represents a latent IDOR: if the connection role ever changes,
          cross-tenant rows become visible. Exactly the pattern that produced
          the CVSS 7.5 onboarding bypass.
      - fixture_id: "rls-002"
        name: "Correct withCurrentTenant usage on asset query"
        description: >
          A PR adds a GET /api/assets/:id route that wraps its Drizzle query in
          withCurrentTenant(async (db) => db.select().from(asset)
          .where(eq(asset.id, assetId))), matching the established pattern
          in api/routes/assets.js.
        expected_outcome: "pass"
        rationale: >
          Query is correctly scoped within withCurrentTenant. RLS will enforce
          tenant boundary at the Postgres layer. No violation.
