version: "1.0"
project: mnemos
description: >
  Pipeline prompt configuration for the Mnemos project.
  Defines additional rules injected into subagent prompts to enforce
  project-specific quality standards.

subagents:

  code_review:
    additional_rules:
      - rule_id: "async-ui-state-visibility"
        severity: "required_changes"
        scope: "src/client/src/"
        applies_to: "React components (.tsx files)"
        description: >
          You MUST flag and request changes for any React component
          (in src/client/src/) that introduces an asynchronous operation —
          including fetch(), axios calls, useMutation(), useQuery(), or any
          equivalent data-fetching or data-mutating pattern — that does not
          explicitly render all three of:
          (1) a loading state (spinner, skeleton, disabled button, etc.),
          (2) an error state (user-readable message, not silent failure),
          (3) a success or completion state.
          This rule is motivated by a 38% onboarding drop-off caused by
          silent async failures (ticket a466cf13).
        exemptions:
          - "Synchronous UI components with no async operations"
          - "Static asset rendering (images, icons, SVG)"
          - "CSS or Tailwind style-only changes"
          - "Read-only display components that do not fetch or mutate data"
          - "Backend files outside src/client/src/ (Express routes, migrations, schema)"
        guidance: >
          If the component uses async operations but the loading/error/success
          states are managed in a parent component or custom hook that is clearly
          visible in the PR diff, do not flag it — only flag cases where no
          visible state handling exists anywhere in the async call chain.
      - rule_id: "tenant-isolation-guardrails"
        severity: "required_changes"
        scope: "api/ lib/ db/"
        applies_to: "Express route handlers and database queries on tenant-scoped tables"
        description: >
          Every query against a tenant-scoped table (entity, asset, asset_version,
          session, session_message, capture, user, onboarding_state, idempotency_record)
          MUST be executed inside withCurrentTenant() or withTenant() from
          lib/tenant-context.js. Bare pool.query(), db.select(), db.insert(),
          db.update(), or db.delete() calls on these tables outside a withTenant
          context are PROHIBITED — Postgres RLS will block them at runtime and they
          represent a latent IDOR vulnerability. The tenant table is explicitly exempt
          because it has no RLS policy and is intentionally queried outside withTenant
          during login (slug → tenantId resolution only).
        anti_pattern: >
          pool.query('SELECT * FROM entity WHERE id = $1', [entityId])
          // Missing withTenant context — RLS will return 0 rows or error in production.
        required_pattern: >
          withCurrentTenant(async (db) =>
            db.select().from(entity).where(eq(entity.id, entityId))
          )
        exemptions:
          - "Queries against the tenant table (no RLS policy, used for slug lookup at login)"
          - "Migration scripts in db/migrations/ (run as superuser outside RLS)"
          - "Seed scripts in db/seed.js (run as superuser outside RLS)"
          - "Frontend files and non-database utility code"
        guidance: >
          Before flagging, trace the full call chain. If the route handler calls a
          helper function that internally calls withTenant(), do not flag it. Only
          flag cases where no withTenant wrapper exists anywhere in the chain between
          the route handler and the database query.

